<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promise generator</title>
    <link rel="stylesheet" href="css/common.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet"/>
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }

      .goback-link {
        margin-left: 0px;
        text-decoration: none;
        color: black;
      }

      button {
        margin-top: 2rem;
        padding: 1rem 3rem;
        border: 1px solid lightgrey;
        border-radius: 10px;
        font-family: "Poppins", sans-serif;
        font-size: 1rem; 
        font-weight: bold;
      }

      input {
        padding: 0.2rem;
        border-radius: 5px;
        font-size: 1rem;
        margin-top: 0.5rem;
      }

      form {
        margin-top: 15rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      label {
        display: flex;
        flex-direction: column;
        align-items: center;
        align-items: center;
        justify-content: center;
      }

      .label-box {
        display: flex;
        gap: 2rem;
      }


    </style>
  </head>
  <body>
    <p><a class="goback-link" href="index.html"><b><<</b> Go back</a></p>

    <form class="form">
      <div class="label-box">
      <label>
        First delay (ms)
        <input type="number" name="delay" required />
      </label>
      <label>
        Delay step (ms)
        <input type="number" name="step" required />
      </label>
      <label>
        Amount
        <input type="number" name="amount" required />
      </label>
    </div>
      <button type="submit">Create promises</button>
    </form>

    <script src="js/03-promises.js" type="module"></script>
  </body>
</html>
